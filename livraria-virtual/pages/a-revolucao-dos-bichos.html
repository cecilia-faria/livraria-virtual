<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Revolução dos Bichos - Livraria Virtual</title>
    <link rel="stylesheet" href="../css/produto.css">
</head>
<body>

    <a class="btn-voltar" href="../index.html">&#8592; Voltar ao Catálogo</a>

    <div class="container">
        <div class="left">
            <img id="product-img" src="../img/a_revolucao_dos_bichos.jpg" alt="Capa do livro A Revolução dos Bichos">
            <div class="mini-gallery">
                <img src="../img/a_revolucao_dos_bichos.jpg" onclick="changeImage(this.src)" alt="A Revolução dos Bichos">
                <img src="../img/revolucao_bichos_verso.jpg" onclick="changeImage(this.src)" alt="A Revolução dos Bichos verso">
            </div>
        </div>
        <div class="right">
            <h1>A Revolução dos Bichos</h1>
            <div class="rating">&#9733;&#9733;&#9733;&#9733;&#9733; (4.210) avaliações</div>
            <div class="price">R$ 17,68</div>
            <div class="description">
                Autor: George Orwell<br>
                Número de páginas: 152<br>
                Idioma: Português<br>
                Peso do produto: 180 gramas<br>
                Editora: Companhia das Letras
            </div>
            <div class="buttons">
                <button class="btn-cart" onclick="addToCart()">Adicionar ao Carrinho</button>
                <button class="btn-buy" onclick="buyNow()">Comprar Agora</button>
            </div>
        </div>
    </div>

    <script src="../js/produto.js"></script>
</body>
</html>
