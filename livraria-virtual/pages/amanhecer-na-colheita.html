<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amanhecer na Colheita - Livraria Virtual</title>
    <link rel="stylesheet" href="../css/produto.css">
</head>
<body>

    <a class="btn-voltar" href="../index.html">&#8592; Voltar ao Catálogo</a>

    <div class="container">
        <div class="left">
            <img id="product-img" src="../img/amanhecer-na-colheita.jpg" alt="Capa do livro Amanhecer na Colheita">
            <div class="mini-gallery">
                <img src="../img/amanhecer-na-colheita.jpg" onclick="changeImage(this.src)" alt="Amanhecer na Colheita">
                
            </div>
        </div>
        <div class="right">
            <h1>Amanhecer na Colheita</h1>
            <div class="rating">&#9733;&#9733;&#9733;&#9733;&#9733; (987) avaliações</div>
            <div class="price">R$ 69,99</div>
            <div class="description">
                Autor: Autor Desconhecido<br>
                Número de páginas: 320<br>
                Idioma: Português<br>
                Peso do produto: 350 gramas<br>
                Editora: Editora Nacional
            </div>
            <div class="buttons">
                <button class="btn-cart" onclick="addToCart()">Adicionar ao Carrinho</button>
                <button class="btn-buy" onclick="buyNow()">Comprar Agora</button>
            </div>
        </div>
    </div>

    <script src="../js/produto.js"></script>
</body>
</html>
