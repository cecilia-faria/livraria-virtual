<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Retrato de Dorian Gray - Livraria Virtual</title>
    <link rel="stylesheet" href="../css/produto.css">
</head>
<body>

    <a class="btn-voltar" href="../index.html">&#8592; Voltar ao Catálogo</a>

    <div class="container">
        <div class="left">
            <img id="product-img" src="../img/o_retrato_de_dorian_gray.jpg" alt="Capa do livro O Retrato de Dorian Gray">
            <div class="mini-gallery">
                <img src="../img/o_retrato_de_dorian_gray.jpg" onclick="changeImage(this.src)" alt="O Retrato de Dorian Gray">
                
            </div>
        </div>
        <div class="right">
            <h1>O Retrato de Dorian Gray</h1>
            <div class="rating">&#9733;&#9733;&#9733;&#9733;&#9733; (1.832) avaliações</div>
            <div class="price">R$ 68,68</div>
            <div class="description">
                Autor: Oscar Wilde<br>
                Número de páginas: 272<br>
                Idioma: Português<br>
                Peso do produto: 400 gramas<br>
                Editora: Penguin
            </div>
            <div class="buttons">
                <button class="btn-cart" onclick="addToCart()">Adicionar ao Carrinho</button>
                <button class="btn-buy" onclick="buyNow()">Comprar Agora</button>
            </div>
        </div>
    </div>

    <script src="../js/produto.js"></script>
</body>
</html>
