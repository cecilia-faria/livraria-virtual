<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madame Bovary - Livraria Virtual</title>
    <link rel="stylesheet" href="../css/produto.css">
</head>
<body>

    <a class="btn-voltar" href="../index.html">&#8592; Voltar ao Catálogo</a>

    <div class="container">
        <div class="left">
            <img id="product-img" src="../img/madame_bovary.jpg" alt="Capa do livro Madame Bovary">
            <div class="mini-gallery">
                <img src="../img/madame_bovary.jpg" onclick="changeImage(this.src)" alt="Madame Bovary">
                
            </div>
        </div>
        <div class="right">
            <h1>Madame Bovary</h1>
            <div class="rating">&#9733;&#9733;&#9733;&#9733;&#9733; (3.401) avaliações</div>
            <div class="price">R$ 18,88</div>
            <div class="description">
                Autor: Gustave Flaubert<br>
                Número de páginas: 368<br>
                Idioma: Português<br>
                Peso do produto: 430 gramas<br>
                Editora: Penguin
            </div>
            <div class="buttons">
                <button class="btn-cart" onclick="addToCart()">Adicionar ao Carrinho</button>
                <button class="btn-buy" onclick="buyNow()">Comprar Agora</button>
            </div>
        </div>
    </div>

    <script src="../js/produto.js"></script>
</body>
</html>
