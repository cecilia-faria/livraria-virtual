<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E não Sobrou Nenhum - Produto</title>
    <link rel="styleheet" href=".html">
</head>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: white;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            max-width: 1100px;
            margin: 20px auto;
            background: #fae1d9;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            align-self: center;
        }

        .left {
            flex: 1;
            min-width: 300px;
            padding: 20px;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .left img {
            max-width: 100%;
            border-radius: 8px;
            transition: 0.3s;
        }

        .left img:hover {
            transform: scale(1.05);
        }

        .mini-gallery {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .mini-gallery img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .mini-gallery img:hover {
            border: 2px solid #ffa41c;
        }
        .right {
        flex: 2; 
        min-width: 300px;
        padding: 20px;
        }

        h1 {
        font-size: 22px;
        margin-bottom: 10px; 
        }

        .rating {
        color: #f39c12; 
        margin-bottom: 15px; 
        }

        .price {
        font-size: 24px; 
        font-weight: bold; 
        color: #8e3d8e; 
        margin-bottom: 15px;
        }

        .description {
        font-size: 15px; 
        margin-bottom: 20px; 
        line-height: 1.5; 
        }

        .buttons {
        display: flex; 
        gap: 15px; 
        flex-wrap: wrap; 
        }

        .buttons button {
        flex: 1; 
        min-width: 140px;
        padding: 12px; 
        font-size: 16px; 
        border: none; 
        border-radius: 6px; 
        cursor: pointer; 
        transition: background 0.2s; 
        }

        .btn-cart {
        background: #e8b3e8; 
        }

        .btn-cart:hover {
        background: #8e3d8e;
        }

        .btn-buy {
        background: #8e3d8e;
        color: #e8b3e8;
        }

        .btn-buy:hover {
        background: #8e3d8e;
        }

        .header {
        width: 100%;
        height: 5%;
        background-color: rgb(31, 30, 30);
        color: black;
        }

        .imgProd {
        height: 80px;
        width: 93px;
        position: center;
        }

        .textProductMini {
        font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        align-items: center;
        }

        .produtoMini {
        align-items: center;
        }

        @media (max-width: 768px) {
            .container {
                display: flex;
                flex-wrap: wrap;
                max-width: 1100px;
            }
            .left {
                border-right: none;
                border-bottom: 1px solid #ddd;
            }
        }
    </style>
<body>
    <div id="header" class="header">
        <img src="" alt="">
    </div>

    <div class="container">
            <div class="left">
                <img id="product-img" src="img/e_não_sobrou_nenhum.jpg" alt="Capa do livro E não Sobrou Nenhum">
                <div class="mini-gallery">
                <img src="img/e_não_sobrou_nenhum.jpg" onclick="changeImage(this.src)">
                <img src="" onclick="changeImage(this.src)">
                <img src="" onclick="changeImage(this.src)">
                <img src="" onclick="changeImage(this.src)">
            </div>
        </div>

        <div class="right">
            <h1 id="product-title">E não Sobrou Nenhum</h1>
            <div class="rating"> ☆☆☆☆☆ (2.565 avaliações)</div>
            <div class="price" id="product-price">R$ 49,95</div>
            <div class="description" id="product-desc">
                Autor: Agatha Christie
                <br>
                Número de páginas: 400
                <br>
                Idioma: Português
                <br>
                Peso do produto: 662.0 gramas.
                <br>
                Editora: Globo Livros
            </div>
            
            <div class="buttons">
                <button class="btn-cart" onclick="addtoCart()">Adiconar ao Carrinho</button>
                <button class="btn-guy" onclick="buyNow()">Comprar Agora</button>
            </div>
        </div>
    </div>

    <script>
        function changeImage(src) {
            document.getElementById('product-img').src = src;
        }
        function addtoCart() {
            alert("Produto adicionado ao carrinho!")
        }
        function buyNow() {
            alert("Redirecionando para o pagamento...")
        }

    </script>
</body>
</html>
